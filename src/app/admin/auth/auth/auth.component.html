<div class="login-container d-flex align-items-center justify-content-center">
  <div class="login-card shadow-lg wrapper fadeInDown">

    <!-- <div class="text-center mb-4">
      <h3 class="fw-bold">Regístrate en los torneos deportivos</h3 >
        <p class="text-muted">Por favor, inicie sesión en su cuenta</p>
      </div> -->

      <div class="d-flex flex-column align-items-center justify-content-center mb-4">
        <img src="../../../../assets/images/logo_fesjaz.webp" alt="Logo" class="logo" style="width: 150px; height: auto;">
        <h3 class="fw-bold text-center">Bienvenido a Feja Union</h3>
        <p class="text-muted">Por favor, inicie sesión con sus credenciales</p>
    </div>

    <form [formGroup]="authForm" class="needs-validation" (ngSubmit)="onSubmited()" autocomplete="off">
      <!-- <div class="mb-3">
        <label for="username" class="form-label">Correo</label>
        <input id="username" type="email" class="form-control custom-input" placeholder="ejemplo@email.com" formControlName="email" required>
      </div> -->
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="username" formControlName="email" placeholder="name@example.com" required autocomplete="off" >
        <label for="username">Correo</label>
      </div>

      <!-- <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input id="password" type="password" class="form-control custom-input" placeholder="••••••••" formControlName="password" required>
      </div> -->

      <div class="form-floating mb-3">
        <input type="password" class="form-control" id="password" placeholder="••••••••" formControlName="password" required autocomplete="off">
        <label for="password">Contraseña</label>
      </div>

      <button [disabled]="!authForm.valid" type="submit" class="btn btn-login w-100">
        Ingresar
      </button>
    </form>

  </div>
</div>
